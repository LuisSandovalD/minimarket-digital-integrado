# ============================================================
# NGINX - default.conf
# Configuración del servidor Nginx como reverse proxy.
# Actúa como punto de entrada único para la aplicación:
# - Redirige el tráfico del frontend a su contenedor
# - Redirige las llamadas a la API al contenedor backend
# ============================================================

server {

    listen 80;
    # Nginx escucha en el puerto 80 (HTTP estándar)
    # Todo el tráfico entrante llegará por este puerto

    server_name localhost;
    # Nombre del servidor. En producción se reemplazaría
    # por el dominio real, ej: server_name midominio.com;

    # ========================================
    # REACT FRONTEND
    # Redirige todas las peticiones que lleguen
    # a la raíz "/" hacia el contenedor frontend
    # que sirve la aplicación React compilada.
    # ========================================

    location / {

        proxy_pass http://frontend:80;
        # Reenvía la petición al contenedor "frontend" en el puerto 80.
        # "frontend" es el nombre del servicio definido en docker-compose,
        # Docker resuelve automáticamente ese nombre como dirección IP interna.

        proxy_http_version 1.1;
        # Usa HTTP/1.1 para soportar conexiones persistentes (keep-alive)
        # y el protocolo WebSocket necesario para el hot-reload en desarrollo

        proxy_set_header Upgrade $http_upgrade;
        # Pasa el header "Upgrade" al backend para permitir
        # el upgrade de la conexión HTTP a WebSocket (HMR de Vite)

        proxy_set_header Connection 'upgrade';
        # Indica que la conexión puede ser actualizada a WebSocket

        proxy_set_header Host $host;
        # Pasa el nombre del host original al contenedor destino
        # para que sepa desde qué dominio llegó la petición

        proxy_cache_bypass $http_upgrade;
        # Evita que Nginx use caché cuando hay una conexión WebSocket activa

    }

    # ========================================
    # BACKEND API
    # Redirige todas las peticiones que empiecen
    # con "/api/" hacia el contenedor backend.
    # Permite que el frontend y backend compartan
    # el mismo dominio/puerto sin problemas de CORS.
    # ========================================

    location /api/ {

        proxy_pass http://backend:5000/api/;
        # Reenvía la petición al contenedor "backend" en el puerto 5000.
        # "backend" es el nombre del servicio en docker-compose.
        # La ruta "/api/" se mantiene al hacer el proxy_pass.

        proxy_http_version 1.1;
        # Usa HTTP/1.1 para soportar conexiones persistentes

        proxy_set_header Upgrade $http_upgrade;
        # Permite upgrade a WebSocket si el backend lo requiere

        proxy_set_header Connection 'upgrade';
        # Indica que la conexión puede ser actualizada

        proxy_set_header Host $host;
        # Pasa el host original para que el backend lo identifique

        proxy_cache_bypass $http_upgrade;
        # Evita caché en conexiones WebSocket

    }

}