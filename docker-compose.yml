version: "3.9"

services:

  # ========================================
  # BACKEND
  # ========================================

  backend:

    build:
      context: ./backend

    container_name: backend

    restart: always

    ports:
      - "5000:5000"

    env_file:
      - ${ENV_FILE_PATH:-./backend/.env}

    volumes:
      - ./backend:/app
      - /app/node_modules

    command: npm run dev

  # ========================================
  # FRONTEND
  # ========================================

  frontend:

    build:
      context: ./frontend

    container_name: frontend

    restart: always

    ports:
      - "5173:80"

    depends_on:
      - backend

  # ========================================
  # NGINX
  # ========================================

  nginx:

    image: nginx:stable-alpine

    container_name: nginx

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend