version: "3.9"

services:
  # ========================================
  # BACKEND (Node.js + Prisma)
  # ========================================
  backend:
    build:
      context: ./backend
    container_name: backend
    restart: always
    expose:
      - "5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
    env_file:
      - ${ENV_FILE_PATH:-./backend/.env}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/node_modules/.prisma 
    command: npm run dev

  # ========================================
  # FRONTEND (React + Vite)
  # ========================================
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: always
    expose:
      - "5173"
    environment:
      - HOST=0.0.0.0
      - VITE_CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npx vite --host 0.0.0.0 --port 5173
    depends_on:
      - backend

  # ========================================
  # NGINX (Único punto de acceso externo)
  # ========================================
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend