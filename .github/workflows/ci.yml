name: Main CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Evita ejecutar pipelines simultáneos en el mismo branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Principio de menor privilegio
permissions:
  contents: read

jobs:
  backend:
    name: Backend Validation
    timeout-minutes: 15
    uses: ./.github/workflows/backend.yml

  frontend:
    name: Frontend Validation
    timeout-minutes: 15
    uses: ./.github/workflows/frontend.yml

  # ========================================
  # PIPELINE SUCCESS
  # ========================================
  pipeline-success:
    name: Pipeline Completed
    needs:
      - backend
      - frontend
    runs-on: ubuntu-latest
    steps:
      - name: Success Message
        run: |
          echo "===================================="
          echo "ALL VALIDATIONS PASSED"
          echo "Backend OK"
          echo "Frontend OK"
          echo "===================================="

  # ========================================
  # PIPELINE FAILURE
  # ========================================
  pipeline-failure:
    name: Pipeline Failed
    needs:
      - backend
      - frontend
    if: always() && (needs.backend.result == 'failure' || needs.frontend.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Failure Message
        run: |
          echo "===================================="
          echo "PIPELINE FAILED"
          echo "Review previous jobs"
          echo "===================================="
          exit 1