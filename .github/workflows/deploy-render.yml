name: Deploy Render

on:
  workflow_run:
    workflows:
      - "Main CI Pipeline"
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy
        run: |
          curl --fail \
            --silent \
            --show-error \
            -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK }}"