name: Deploy Pipeline

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Crear archivo .env en todas las ubicaciones posibles
        run: |
          # 1. Asegurar que existe la carpeta backend
          mkdir -p backend
          
          # 2. Definir el contenido del archivo de entorno
          echo 'DATABASE_URL="${{ secrets.DATABASE_URL }}"' > .env
          echo 'JWT_SECRET="${{ secrets.JWT_SECRET }}"' >> .env
          echo "PORT=5000" >> .env
          
          # 3. Copiarlo exactamente a la subcarpeta backend también
          cp .env backend/.env

      - name: Verificar ubicacion de archivos
        run: |
          echo "=== Archivo en la raiz ==="
          ls -la .env || echo "No esta en la raiz"
          echo "=== Archivo en backend ==="
          ls -la backend/.env || echo "No esta en backend"

      - name: Construir imagenes de Docker
        run: docker compose build

      - name: Levantar contenedores con Docker Compose
        run: docker compose up -d