name: Deploy Pipeline

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      # Creamos el archivo EXACTAMENTE en la ruta que Docker está reclamando
      - name: Crear archivo .env en la carpeta backend
        run: |
          mkdir -p backend
          echo 'DATABASE_URL="${{ secrets.DATABASE_URL }}"' > backend/.env
          echo 'JWT_SECRET="${{ secrets.JWT_SECRET }}"' >> backend/.env
          echo "PORT=5000" >> backend/.env

      # Paso de seguridad para asegurarnos de que el archivo existe antes de correr Docker
      - name: Verificar que el archivo existe
        run: ls -la backend/.env

      - name: Construir imagenes de Docker
        run: docker compose build

      - name: Levantar contenedores con Docker Compose
        run: docker compose up -d