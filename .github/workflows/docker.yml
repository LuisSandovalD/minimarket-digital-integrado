name: Docker Pipeline

on:
  workflow_call:
    # 1. Definimos que este archivo espera recibir los secretos del pipeline principal
    secrets:
      DATABASE_URL:
        required: true
      JWT_SECRET:
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # ========================================
      # CHECKOUT
      # ========================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ========================================
      # INJECT ENV (El paso que faltaba)
      # ========================================
      - name: Create .env file for Backend
        run: |
          mkdir -p backend
          echo 'DATABASE_URL="${{ secrets.DATABASE_URL }}"' > backend/.env
          echo 'JWT_SECRET="${{ secrets.JWT_SECRET }}"' >> backend/.env
          echo "PORT=5000" >> backend/.env

      # ========================================
      # BUILDX
      # ========================================
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ========================================
      # BUILD
      # ========================================
      - name: Docker Compose Build
        run: docker compose build

      # ========================================
      # START
      # ========================================
      - name: Docker Compose Up
        run: docker compose up -d

      # ========================================
      # WAIT
      # ========================================
      - name: Wait Containers
        run: sleep 15

      # ========================================
      # STATUS
      # ========================================
      - name: Docker Status
        run: docker ps

      # ========================================
      # SUCCESS
      # ========================================
      - name: Docker Success
        run: echo "Docker validated"